{% extends 'base.html' %}
{% block content %}
<div class="flex-container">

    <!-- Left: challenge selector + code editor -->
    <div class="sandbox-container">
        <select id="program-dropdown">
            <option value="" disabled selected>Select a challenge</option>
        </select>
        <form id="sandbox-form">
            <div id="code-tabs">
                <!-- Style tabs injected by scripts.js -->
            </div>
            <div class="code-container">
                <textarea id="code-input"></textarea>
            </div>
        </form>
    </div>

    <!-- Right: input, test tabs, output, score -->
    <div class="output-container">
        <div class="test-container">
            <button id="clear-button">🧹</button>
            <button id="run-button">▶</button>
            <textarea id="input-box" class="test-input"
                placeholder="Type input e.g. [0,1] or click a tab above"></textarea>
        </div>

        <div id="tab-buttons">
            <!-- Test case tabs injected by scripts.js -->
        </div>

        <div id="output-window">
            <pre id="output"></pre>
        </div>

        <div id="overall-score-container">
            <span id="total-score-text" class="total-score-text">Total Score: 0 / 60</span>
            <progress id="total-score-meter" max="60" value="0" class="total-score-meter"></progress>
        </div>

        <div class="bottom-buttons">
            <button id="save-game-button">Save Game</button>
            <button id="load-game-button">Load Game</button>
            <input type="file" id="load-game-input" style="display:none" accept=".json">
        </div>
    </div>

</div>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/material.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>
{% endblock %}
