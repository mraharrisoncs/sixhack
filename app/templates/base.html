<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>six(im).possible().things()</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,400;0,600;0,700;1,400&family=Kode+Mono:wght@400;700&display=swap">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>

<body>
    <header>
        <div id="header-top">
            <div id="header-title">
                <h1><span id="header-brand">six(im).possible().things()</span><span id="header-subtitle">One problem. Six solutions. Infinite possibilities.</span></h1>
            </div>
            <nav>
                <a href="{{ url_for('home') }}">Home</a>
                <a href="{{ url_for('about') }}">About</a>
                <button id="theme-toggle" onclick="toggleTheme()" title="Toggle dark/light mode">💡</button>
            </nav>
        </div>
        <div id="level-bar">
            <!-- Level hexagons injected by scripts.js -->
            <div id="header-scores">
                <div class="score-box score-box-timer" id="timer-box">
                    <span class="score-symbol">⏱</span>
                    <span id="timer-display">00:00</span>
                </div>
                <div class="score-box" id="challenge-score-box">
                    <span class="score-symbol">Q</span>
                    <span id="challenge-score-display">–</span>
                </div>
                <div class="score-box score-box-total" id="total-score-box">
                    <span class="score-symbol score-symbol-sigma">Σ</span>
                    <span id="total-score-display">0</span>
                </div>
            </div>
        </div>
    </header>
    <main>
        {% block content %}
        {% endblock %}
    </main>
    <script>
        function toggleTheme() {
            const isDark = document.body.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            if (typeof codeMirrorEditor !== 'undefined' && codeMirrorEditor) {
                codeMirrorEditor.setOption('theme', isDark ? 'material' : 'default');
            }
            if (typeof repaintTabFills === 'function') repaintTabFills();
        }
        if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark');
    </script>
    <script src="{{ url_for('static', filename='js/scripts.js') }}"></script>
</body>

</html>
