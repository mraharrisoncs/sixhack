<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Six Hack!</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,400;0,600;0,700;1,400&display=swap">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>

<body>
    <header>
        <div id="header-top">
            <div id="header-title">
                <h1>Six Hack! <span id="header-subtitle">— solving problems six ways</span></h1>
            </div>
            <nav>
                <a href="{{ url_for('home') }}">Home</a>
                <a href="{{ url_for('about') }}">About</a>
                <button id="theme-toggle" onclick="toggleTheme()" title="Toggle dark/light mode">💡</button>
            </nav>
        </div>
        <div id="level-bar">
            <!-- Level diamonds injected by scripts.js -->
        </div>
    </header>
    <main>
        {% block content %}
        {% endblock %}
    </main>
    <script>
        function toggleTheme() {
            const isDark = document.body.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            if (typeof codeMirrorEditor !== 'undefined' && codeMirrorEditor) {
                codeMirrorEditor.setOption('theme', isDark ? 'material' : 'default');
            }
            if (typeof repaintTabFills === 'function') repaintTabFills();
        }
        if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark');
    </script>
    <script src="{{ url_for('static', filename='js/scripts.js') }}"></script>
</body>

</html>
